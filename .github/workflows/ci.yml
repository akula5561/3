name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          SERVER_SSL_ENABLED: "false"
          JWT_SECRET: test-secret-key-for-ci-tests-32-bytes
        run: mvn -B test

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SIGNATURE_KEY_STORE_PATH: classpath:signing.jks
      SIGNATURE_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
      SIGNATURE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNATURE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Restore server.jks from GitHub Secrets
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > src/main/resources/server.jks
          ls -l src/main/resources/server.jks

      - name: Restore signing.jks from GitHub Secrets
        run: |
          mkdir -p src/main/resources
          test -n "${{ secrets.SIGNING_KEYSTORE_B64 }}" || (echo "SIGNING_KEYSTORE_B64 is empty"; exit 1)
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 --decode > src/main/resources/signing.jks
          ls -l src/main/resources/signing.jks

      - name: Build package
        run: mvn -B clean package


      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
