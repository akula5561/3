spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

server.ssl.enabled=false
security.jwt.secret=test-secret-key-for-ci-tests-32-bytes

signature.key-store-path=classpath:signing-test.jks
signature.key-store-type=JKS
signature.key-store-password=changeit
signature.key-alias=app-signing
signature.key-password=changeit
signature.algorithm=SHA256withRSA
