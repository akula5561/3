# Активный профиль по умолчанию (можно переопределить через SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# =========================
# Общие настройки приложения
# =========================
server.error.include-message=always

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# JPA
spring.jpa.open-in-view=true

# HTTPS / TLS
server.port=${SERVER_PORT:8443}
server.ssl.enabled=${SERVER_SSL_ENABLED:true}

server.ssl.key-store=classpath:server.jks
server.ssl.key-store-type=JKS
server.ssl.key-alias=server

server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-password=${KEYSTORE_PASSWORD}

security.jwt.secret=${JWT_SECRET}
security.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
security.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:1209600}

# Digital signature module (lab 3)
signature.key-store-path=${SIGNATURE_KEY_STORE_PATH:classpath:server.jks}
signature.key-store-type=${SIGNATURE_KEY_STORE_TYPE:JKS}
signature.key-store-password=${SIGNATURE_KEY_STORE_PASSWORD:${KEYSTORE_PASSWORD}}
signature.key-alias=${SIGNATURE_KEY_ALIAS:server}
# If empty, key provider falls back to key-store-password (keytool-compatible behavior)
signature.key-password=${SIGNATURE_KEY_PASSWORD:${SIGNATURE_KEY_STORE_PASSWORD:${KEYSTORE_PASSWORD}}}
signature.algorithm=${SIGNATURE_ALGORITHM:SHA256withRSA}
