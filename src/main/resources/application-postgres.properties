# ===============================
# PostgreSQL Database Connection
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/library}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# ===============================
# Flyway (миграции src/main/resources/db/migration) — выполняется до JPA
# ===============================
spring.flyway.enabled=true
# Схема уже с таблицами (Hibernate/ручной SQL), но без flyway_schema_history — иначе Flyway падает
spring.flyway.baseline-on-migrate=true
# «Начальная отметка» 0: затем применяются все версии V1…V8 (не пропускать V1, иначе V3 сломается без loans)
spring.flyway.baseline-version=0

# Демо-данные: admin / user + ключ DEMO-ACTIVATION-KEY-001 (отключить в проде: false)
app.seed-demo-data=true

# ===============================
# Hibernate / JPA — схему не меняем из кода (избегаем конфликтов с типами/NOT NULL)
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ===============================
# Swagger / API Docs
# ===============================
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs
